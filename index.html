<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingvoConnect IELTS</title>
    <meta name="description" content="Official IELTS Mock Test Platform — LingvoConnect" />
    <style>
      #root-loader {
        display:flex;align-items:center;justify-content:center;
        height:100vh;background:#F5FEFA;font-family:sans-serif;
      }
      #root-loader .dot {
        width:40px;height:40px;border-radius:50%;
        border:4px solid #E6FAF4;border-top-color:#11CD87;
        animation:lspin .8s linear infinite;margin:0 auto 16px;
      }
      @keyframes lspin{to{transform:rotate(360deg)}}
      #root-loader p{color:#11CD87;font-weight:700;font-size:16px;margin:0}
      #root-loader small{color:#94A3B8;font-size:12px}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loader">
        <div style="text-align:center">
          <div class="dot"></div>
          <p>LingvoConnect IELTS</p>
          <small>Loading platform…</small>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
